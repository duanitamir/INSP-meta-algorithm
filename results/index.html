<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Graph Matching - Analytics Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --accent: #f093fb;
            --success: #43e97b;
            --warning: #feca57;
            --danger: #fa709a;
            --info: #48dbfb;
            --bg-light: #f5f7fa;
            --bg-white: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --border: #e0e6ed;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #c3cfe2 100%);
            color: var(--text-primary);
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: var(--bg-white);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .sidebar-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .sidebar-subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .sidebar-menu {
            flex: 1;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .menu-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .menu-item:hover {
            background: rgba(102, 126, 234, 0.05);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .menu-item.active {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 1.5rem 2rem;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Cards */
        .card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Grid Layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        /* Component Cards */
        .component-card {
            background: linear-gradient(135deg, #f8fafb 0%, #f0f3f7 100%);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .component-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, currentColor, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .component-card:hover {
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.2);
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .component-card:hover::before {
            opacity: 1;
        }

        .component-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .component-title {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .component-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            flex-grow: 1;
            margin-bottom: 0.5rem;
        }

        .component-tag {
            display: inline-block;
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Layer Sections */
        .layer-section {
            margin-bottom: 3rem;
        }

        .layer-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .layer-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
        }

        .layer-info h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .layer-info p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal-background {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .modal-background.show {
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 2rem;
            max-width: 95vw;
            max-height: 95vh;
            width: 1400px;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            animation: modalSlideIn 0.3s ease;
        }

        .modal.show {
            display: block;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -48%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            color: var(--primary);
            transform: scale(1.2);
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .modal-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .modal-section-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .modal-section-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .modal-section-content code {
            background: rgba(102, 126, 234, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            color: var(--primary);
        }

        .modal-bullets {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0;
        }

        .modal-bullets li {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-left: 1.5rem;
            padding-left: 0.5rem;
        }

        .modal-bullets li:before {
            content: '•';
            color: var(--primary);
            font-weight: bold;
            display: inline-block;
            width: 1rem;
            margin-left: -1.5rem;
        }

        .flow-card {
            background: linear-gradient(135deg, #f8fafb 0%, #f0f3f7 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .flow-card:hover {
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .flow-card h3 {
            color: var(--primary);
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
        }

        .flow-card .flow-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            line-height: 1.6;
        }

        /* Flow component chip styles */
        .flow-component-chip {
            background: white;
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .flow-component-chip:hover {
            background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.1);
        }

        /* Flow step styles */
        .flow-step {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            position: relative;
        }

        .flow-step-number {
            background: var(--primary);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(102,126,234,0.2);
        }

        .flow-step-content {
            flex: 1;
            padding-top: 0.25rem;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.6;
        }

        /* Experiment Cards */
        .experiment-card {
            background: linear-gradient(135deg, #f8fafb 0%, #f0f3f7 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .experiment-card:hover {
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .experiments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .experiment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .experiment-metric {
            text-align: center;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .experiment-metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .experiment-metric-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Tabs */
        .tab-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .data-table thead {
            background: rgba(102,126,234,0.1);
        }

        .data-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .data-table tbody tr:hover {
            background: rgba(102,126,234,0.05);
        }

        .metric-good {
            color: var(--success);
            font-weight: 600;
        }

        .metric-warning {
            color: var(--warning);
            font-weight: 600;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
            .grid-3 { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 250px;
            }
            .content {
                padding: 1rem;
            }
            .modal {
                max-width: calc(100vw - 2rem);
                max-height: 90vh;
            }
        }

        @media (max-width: 640px) {
            #app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 60px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            .sidebar-header {
                padding: 1rem;
                border-right: 1px solid var(--border);
                border-bottom: none;
            }
            .sidebar-menu {
                flex-direction: row;
                gap: 0;
                overflow-x: auto;
            }
            .menu-item {
                padding: 1rem;
                border-left: none;
                border-bottom: 3px solid transparent;
            }
            .menu-item.active {
                border-left: none;
                border-bottom-color: var(--primary);
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">🏗️ DGM</div>
                <div class="sidebar-subtitle">Analytics Hub</div>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-item active" onclick="navigateTo('architecture')">
                    🏗️ Architecture
                </div>
                <div class="menu-item" onclick="navigateTo('components')">
                    ⚙️ Components
                </div>
                <div class="menu-item" onclick="navigateTo('flows')">
                    🔄 Flows
                </div>
                <div class="menu-item" onclick="navigateTo('algorithms')">
                    🧬 Algorithms
                </div>
                <div class="menu-item" onclick="navigateTo('experiments')">
                    📈 Experiments
                </div>
                <div class="menu-item" onclick="navigateTo('results')">
                    📊 Analytics
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <h1 id="page-title">Distributed Graph Matching System</h1>
                <p id="page-subtitle">Complete system architecture with 7 layers</p>
            </header>

            <!-- Content Area -->
            <div class="content">
                <!-- Architecture Page -->
                <div id="architecture-page" class="page active"></div>

                <!-- Components Page -->
                <div id="components-page" class="page"></div>

                <!-- Flows Page -->
                <div id="flows-page" class="page"></div>

                <!-- Algorithms Page -->
                <div id="algorithms-page" class="page"></div>

                <!-- Experiments Page -->
                <div id="experiments-page" class="page"></div>

                <!-- Results Page -->
                <div id="results-page" class="page"></div>
            </div>
        </div>
    </div>

    <!-- Modal Template -->
    <div id="modal-background" class="modal-background"></div>
    <div id="modal" class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modal-title"></div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script>
        // Data Layer
        const flows = [
            {
                id: 'ga-standard',
                title: '🎯 GA Standard Flow',
                description: 'Single-pass algorithm evaluation for each parameter vector. <strong style="color: var(--primary)">Agnostic to algorithm selection</strong> - adapts to any algorithm configuration automatically.',
                steps: [
                    'Load graph',
                    'Initialize GA (CanonicalVector discovers available algorithms)',
                    'Vector shape = base params (2) + all algorithm params',
                    'For 10 generations: (1) Evaluate 20 vectors of discovered shape',
                    '(2) Run orchestrator once per vector',
                    '(3) Each algorithm extracts its own params from vector',
                    '(4) Compute fitness (merge all algorithm results)',
                    '(5) Select elite, breed, mutate',
                    'Export best parameters & fitness history'
                ],
                components: ['Graph Data', 'Algorithm Registry', 'GA Optimizer', 'CanonicalVector', 'Fitness Evaluator', 'Orchestrator', 'All Selected Algorithms'],
                timing: '~3 minutes per seed (200 vectors × 1s each)',
                usecase: 'Fast feedback for parameter exploration. Works with any algorithm subset (1, 2, or 3 algorithms).'
            },
            {
                id: 'ga-cascading',
                title: '💫 GA Cascading Flow',
                description: 'Multi-pass algorithm evaluation with cascading refinement. <strong style="color: var(--primary)">Configuration-agnostic</strong> - runs multiple cascades on shrinking graphs regardless of algorithm selection.',
                steps: [
                    'Load graph',
                    'Initialize GA (discover algorithms + vector shape)',
                    'Run GA Standard for 9 generations',
                    'For final generation: (1) Evaluate 10 elite vectors',
                    '(2) Run cascading rounds on shrinking graphs',
                    '   - Cascade 1: All algorithms on full graph',
                    '   - Cascade 2+: All algorithms on remaining unmatched nodes',
                    '(3) Each algorithm extracts params, finds matches on shrinking graph',
                    '(4) Compute cumulative fitness (sum across all cascades)',
                    '(5) Export best vector with cascading metrics'
                ],
                components: ['Graph Data', 'Algorithm Registry', 'GA Optimizer', 'Cascading Evaluator', 'All Selected Algorithms'],
                timing: '~4 minutes per seed (9 gens × 20 + final × 5s per vector)',
                usecase: 'High-quality optimization. Works with any algorithm combination - each algorithm adapts to cascading automatically.'
            },
            {
                id: 'baseline-computation',
                title: '📏 Baseline Computation',
                description: 'Single evaluation to establish performance baseline. <strong style="color: var(--primary)">Uses selected algorithms</strong> - baseline adapts to current algorithm configuration.',
                steps: [
                    'Load graph',
                    'Create default CanonicalVector (random values within bounds)',
                    'Run FitnessEvaluator (calls all selected algorithms)',
                    'Baseline = merged result from all algorithms in registry',
                    'Store for comparison against GA results',
                    'Supports any algorithm combination (1, 2, or 3 algorithms)'
                ],
                components: ['Graph Data', 'Algorithm Registry', 'CanonicalVector', 'Fitness Evaluator', 'All Selected Algorithms'],
                timing: '~1 second per seed',
                usecase: 'Reference point for GA improvement calculation. Changes automatically if algorithm configuration changes.'
            },
            {
                id: 'result-export',
                title: '💾 Result Export & Dashboard',
                description: 'Collect metrics and visualize via interactive dashboard',
                steps: [
                    'GA completes (standard & cascading)',
                    'Collect: parameters, fitness history, timing breakdown',
                    'Compute: improvement %, gap to optimal, per-algorithm contribution',
                    'Format as JSON with configuration & findings',
                    'Save to timestamped file in jsons/ directory',
                    'Dashboard auto-discovers and displays results'
                ],
                components: ['Fitness Evaluator', 'Results Export', 'Dashboard', 'Analytics'],
                timing: 'Instant (JSON serialization)',
                usecase: 'Result visualization and post-hoc analysis'
            }
        ];

        const pages = {
            architecture: {
                title: 'System Architecture',
                subtitle: 'Complete 7-layer distributed architecture',
                render: renderArchitecturePage
            },
            components: {
                title: 'System Components',
                subtitle: 'Detailed component documentation',
                render: renderComponentsPage
            },
            flows: {
                title: 'System Flows',
                subtitle: 'High-level execution flows and data pipelines',
                render: renderFlowsPage
            },
            algorithms: {
                title: 'Matching Algorithms',
                subtitle: 'Three complementary algorithm implementations',
                render: renderAlgorithmsPage
            },
            experiments: {
                title: 'Experiment Results',
                subtitle: 'GA optimization experiments from JSON files',
                render: renderExperimentsPage
            },
            results: {
                title: 'Results & Analytics',
                subtitle: 'GA optimization results and performance metrics',
                render: renderResultsPage
            }
        };

        const layers = [
            {
                number: 1,
                name: 'Input Layer',
                description: 'Graph data structure and system configuration parameters',

        // Template Rendering Functions
        function renderArchitecturePage() {
            let html = '';
            layers.forEach(layer => {
                html += `
                    <div class="layer-section">
                        <div class="layer-header">
                            <div class="layer-number" style="background: ${layer.color}">${layer.number}</div>
                            <div class="layer-info">
                                <h2>${layer.name}</h2>
                                <p>${layer.description}</p>
                            </div>
                        </div>
                        <div class="grid-${layer.components.length <= 2 ? 2 : layer.components.length <= 3 ? 3 : 4}">
                            ${layer.components.map(comp => `
                                <div class="component-card" onclick="openModal('${comp.id}')" style="color: ${layer.color}">
                                    <div>
                                        <div class="component-icon">${comp.icon}</div>
                                        <div class="component-title">${comp.title}</div>
                                        <div class="component-desc">${comp.desc}</div>
                                    </div>
                                    <div class="component-tag">${comp.tag}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            document.getElementById('architecture-page').innerHTML = html;
        }

        function renderComponentsPage() {
            const allComponents = [];
            layers.forEach(layer => {
                layer.components.forEach(comp => {
                    allComponents.push({ ...comp, layerColor: layer.color });
                });
            });

            let html = '<div class="grid-2">';
            allComponents.forEach(comp => {
                html += `
                    <div class="card" onclick="openModal('${comp.id}')" style="cursor: pointer; border-left: 4px solid ${comp.layerColor}">
                        <div class="card-title" style="color: ${comp.layerColor}">
                            <span>${comp.icon}</span> ${comp.title}
                        </div>
                        <p style="color: var(--text-secondary); line-height: 1.6">${comp.desc}</p>
                        <div class="component-tag">${comp.tag}</div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('components-page').innerHTML = html;
        }

        let experimentData = [];

        async function loadExperiments() {
            try {
                // List all JSON files in jsons directory
                const filesResponse = await fetch('jsons/');
                const filesHtml = await filesResponse.text();

                // Extract filenames from HTML directory listing
                const parser = new DOMParser();
                const doc = parser.parseFromString(filesHtml, 'text/html');
                const links = doc.querySelectorAll('a');
                const jsonFiles = Array.from(links)
                    .map(a => a.textContent)
                    .filter(name => name.startsWith('experiment_') && name.endsWith('.json'));

                // Load all experiments
                for (const file of jsonFiles) {
                    try {
                        const response = await fetch(`jsons/${file}`);
                        if (response.ok) {
                            experimentData.push(await response.json());
                        }
                    } catch (e) {
                        console.log(`Failed to load ${file}:`, e);
                    }
                }

                // Sort by date (newest first)
                experimentData.sort((a, b) => new Date(b.date) - new Date(a.date));
            } catch (e) {
                console.log('No experiments found or could not list directory:', e);
                // Fallback: try to load the known experiment
                try {
                    const response = await fetch('jsons/experiment_20260717_170530.json');
                    if (response.ok) {
                        experimentData = [await response.json()];
                    }
                } catch (fallbackE) {
                    console.log('Fallback also failed:', fallbackE);
                }
            }
        }

        function switchTab(e, tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {

            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            const tabContent = document.getElementById(tabName);
            if (tabContent) {
                tabContent.classList.add('active');
                e.target.classList.add('active');

                // Render charts when tabs are activated
                if (tabName === 'charts') {
                    setTimeout(() => {
                        renderFitnessCharts();
                        renderBaselineCharts();
                        renderParameterCharts();

                }
                if (tabName === 'resources') {

                        renderExecutionSummary();
                        renderAlgorithmContribution();
                        renderConvergenceMetrics();
                    }, 50);

                                        fill: false,
                                        pointRadius: 0

                            options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                plugins: {
                                    title: { display: true, text: `Seed ${seed}` },
                                    legend: { position: 'bottom' },
                                    tooltip: {
                                        callbacks: {
                                            afterLabel: function(context) {
                                                if (context.dataIndex === 0) return '';

                                                let currentVal, prevVal;

                                                if (context.datasetIndex === 0) {
                                                    // GA Standard
                                                    currentVal = data.generationProgression[context.dataIndex];
                                                    prevVal = data.generationProgression[context.dataIndex - 1];
                                                } else if (context.datasetIndex === 1) {
                                                    // GA Cascading
                                                    currentVal = (data.generationProgressionCascading || data.generationProgression)[context.dataIndex];
                                                    prevVal = (data.generationProgressionCascading || data.generationProgression)[context.dataIndex - 1];

                                                    return '';

                                                const improvement = ((currentVal - prevVal) / prevVal * 100).toFixed(2);

        function renderParameterCharts() {
            const expIdx = window.currentExpIdx;
            const exp = experimentData[expIdx];
            if (!exp) return;

            const paramData = {};
            Object.values(exp.results.perSeed).forEach(data => {
                if (data && data.bestParameters) {
                    Object.entries(data.bestParameters).forEach(([key, value]) => {
                        if (!paramData[key]) paramData[key] = [];
                        paramData[key].push(value);
                    });
                }
            });

            // Float parameters
            const floatParams = Object.keys(paramData).filter(k =>
                k.includes('coeff') || k.includes('base_probability') || k.includes('threshold')
            ).sort();

            const floatCtx = document.getElementById('param-float-chart');
            if (floatCtx && floatParams.length > 0) {
                new Chart(floatCtx, {
                    type: 'bar',
                    data: {
                        labels: floatParams,
                        datasets: [{
                            label: 'Mean Value',
                            data: floatParams.map(p => {
                                const mean = paramData[p].reduce((a, b) => a + b, 0) / paramData[p].length;
                                return mean;
                            }),
                            backgroundColor: '#667eea',
                            borderColor: '#2c3e50',
                            borderWidth: 1.5
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: { x: { beginAtZero: true } }
                    }
                });
            }

            // Integer parameters
            const intParams = Object.keys(paramData).filter(k =>
                k.includes('timeout') || k.includes('iterations') || k.includes('max_rounds')
            ).sort();

            const intCtx = document.getElementById('param-int-chart');
            if (intCtx && intParams.length > 0) {
                new Chart(intCtx, {
                    type: 'bar',
                    data: {
                        labels: intParams,
                        datasets: [{

                            }),

                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: { x: { beginAtZero: true } }
                    }
                });
            }
        }

        function renderResourcePieChart() {
            const expIdx = window.currentExpIdx;
            const exp = experimentData[expIdx];
            if (!exp) return;

            // Get first seed's resource breakdown
            const firstSeedKey = Object.keys(exp.results.perSeed)[0];
            const firstSeed = exp.results.perSeed[firstSeedKey];
            if (!firstSeed || !firstSeed.resourceBreakdown) return;

            const rb = firstSeed.resourceBreakdown;
            const labels = [];
            const data = [];
            const colors = [];

            const colorMap = {
                'graph_loading': '#667eea',
                'networkx_optimal': '#764ba2',
                'baseline_standard': '#48dbfb',
                'baseline_cascading': '#f093fb',
                'individual_algorithms': '#43e97b',
                'ga_standard': '#feca57',
                'ga_cascading': '#fa709a'
            };

            Object.entries(rb).forEach(([key, item]) => {
                if (item && item.percentage && item.percentage > 0.5) { // Only show items > 0.5%
                    const label = key.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                    labels.push(label);
                    data.push(item.percentage);
                    colors.push(colorMap[key] || '#667eea');
                }
            });

            // If no data, skip rendering
            if (data.length === 0) return;

            const ctx = document.getElementById('resource-pie-chart');
            if (ctx && ctx.getContext) {
                if (window.resourcePieChart) window.resourcePieChart.destroy();
                window.resourcePieChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: colors,
                            borderColor: '#fff',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 15 } },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.label + ': ' + context.parsed + '%';
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }

        function renderExecutionSummary() {

            const exp = experimentData[expIdx];

            let summaryHtml = '';
            Object.entries(exp.results.perSeed).forEach(([seed, data]) => {
                if (!data) return;
                const metrics = data.executionMetrics || {};

                // Get from either executionMetrics or calculate from summary
                const totalTime = metrics.totalExecutionSeconds || exp.results.summary?.totalExecutionTime || 0;
                const gaStdTime = metrics.gaStandardTimeSeconds || 0;
                const gaCascTime = metrics.gaCascadingTimeSeconds || 0;
                const gaStdPct = totalTime > 0 ? ((gaStdTime / totalTime) * 100) : 0;
                const gaCascPct = totalTime > 0 ? ((gaCascTime / totalTime) * 100) : 0;
                const avgTimePerEval = metrics.averageTimePerEvaluation || 0;
                const avgTimePerGen = metrics.averageTimePerGeneration || 0;
                const genCount = metrics.generationCount || exp.configuration?.generations || 0;
                const popSize = metrics.populationSize || exp.configuration?.populationSize || 0;

                // Show all seeds, not just first
                summaryHtml += `
                    <div style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border)">
                        <div style="margin-bottom: 0.5rem"><strong>Seed ${data.seed || seed}</strong></div>

                        <div>GA Standard: <strong>${gaStdTime.toFixed(2)}s</strong> (${gaStdPct.toFixed(1)}%)</div>

                        <div style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-secondary)">

                            <div>Gens: <strong>${genCount}</strong> | Pop: <strong>${popSize}</strong></div>
                        </div>
                    </div>
                `;
            });

            const elem = document.getElementById('execution-summary');
            if (elem) {
                elem.innerHTML = summaryHtml || '<div style="color: var(--text-secondary)">No execution data available</div>';
            }
        }

                                responsive: true,
                                maintainAspectRatio: true,
                                plugins: {
                                    title: { display: true, text: `Seed ${seed} - Algorithm Contribution` },
                                    legend: { position: 'bottom' },
                                    tooltip: {
                                        callbacks: {
                                            label: function(context) {
                                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                                const pct = ((context.parsed / total) * 100).toFixed(1);
                                                return context.label + ': ' + context.parsed.toFixed(0) + ' (' + pct + '%)';
                                            }
                                        }
                                    }
                                }
                            }
                        });
                    }
                }, 100);
            });
        }

        function renderConvergenceMetrics() {
            const expIdx = window.currentExpIdx;
            const exp = experimentData[expIdx];
            if (!exp) return;

            const container = document.getElementById('convergence-metrics');
            if (!container) return;

            let metricsHtml = '';
            Object.entries(exp.results.perSeed).forEach(([seed, data]) => {
                if (!data) return;

                const genProgStd = data.generationProgression || [];

                // Safety check: if no generation data, show placeholder
                if (!genProgStd || genProgStd.length === 0) {
                    metricsHtml += `
                        <div style="background: rgba(102,126,234,0.05); padding: 1rem; border-radius: 8px; border-left: 4px solid var(--primary)">
                            <div style="font-weight: bold; margin-bottom: 0.5rem; color: var(--primary)">Seed ${data.seed || seed}</div>
                            <div style="font-size: 0.9rem; color: var(--text-secondary)">No generation data available</div>
                        </div>
                    `;
                    return;
                }

                // Calculate convergence metrics
                const convergedAtGen = genProgStd.findIndex((v, i, arr) =>
                    i > 0 && arr[i] === arr[i-1]
                );
                const convergeGen = convergedAtGen > 0 ? convergedAtGen : genProgStd.length;

                // Count improving generations
                const improvingGens = genProgStd.filter((v, i) => i === 0 || v > genProgStd[i-1]).length;

                // Calculate final improvement
                const initialFitness = genProgStd[0] || 0;
                const finalFitness = genProgStd[genProgStd.length - 1] || 0;
                const totalImprovement = initialFitness > 0 ? ((finalFitness - initialFitness) / initialFitness * 100).toFixed(2) : '0';

                // Quality metric: fitness per second
                const timePerEval = data.executionMetrics?.averageTimePerEvaluation || 1;
                const fitnessPerSec = finalFitness > 0 && timePerEval > 0 ? (finalFitness / timePerEval).toFixed(1) : '0';

                metricsHtml += `
                    <div style="background: rgba(102,126,234,0.05); padding: 1rem; border-radius: 8px; border-left: 4px solid var(--primary)">
                        <div style="font-weight: bold; margin-bottom: 0.5rem; color: var(--primary)">Seed ${data.seed || seed}</div>
                        <div style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.8">
                            <div>🎯 Converged at Gen: <strong>${convergeGen}</strong></div>
                            <div>📈 Improving Gens: <strong>${improvingGens}/${genProgStd.length}</strong></div>
                            <div>💪 Total Improvement: <strong>${totalImprovement}%</strong></div>
                            <div>⚡ Fitness/Second: <strong>${fitnessPerSec}</strong></div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = metricsHtml || '<div style="color: var(--text-secondary)">No convergence data available</div>';
        }

        function showSeedDetail(seed, expIdx) {
            const exp = experimentData[expIdx];
            const data = exp.results.perSeed[seed];

            const genData = data.generationProgression.map((v, i) => `Gen ${i}: ${v.toFixed(0)}`).join(' → ');
            const genDataCasc = data.generationProgressionCascading.map((v, i) => `Gen ${i}: ${v.toFixed(0)}`).join(' → ');

            let detail = `
                <strong>Seed ${seed} - Detailed Results</strong><br><br>
                <strong>Fitness Progression (Standard):</strong><br>${genData}<br><br>
                <strong>Fitness Progression (Cascading):</strong><br>${genDataCasc}<br><br>
                <strong>Best Parameters:</strong><br>
                ${Object.entries(data.bestParameters).map(([k, v]) => `${k}: ${typeof v === 'number' ? v.toFixed(4) : v}`).join('<br>')}<br><br>
                <strong>Algorithm Weights:</strong><br>
                Greedy: ${data.algorithmWeights.greedy}<br>
                Itai: ${data.algorithmWeights.itai}<br>
                Luby: ${data.algorithmWeights.luby}<br><br>
                <strong>Execution Metrics:</strong><br>
                Total Time: ${data.executionMetrics.totalExecutionSeconds.toFixed(2)}s<br>
                Avg per Eval: ${data.executionMetrics.averageTimePerEvaluation.toFixed(4)}s<br>
                Avg per Gen: ${data.executionMetrics.averageTimePerGeneration.toFixed(2)}s
            `;

            openModalWithContent('Seed ' + seed + ' Details', detail);
        }

        function renderResultsPage() {
            const resultItems = [
                {
                    id: 'results',
                    icon: '✅',
                    title: 'Results',
                    description: 'Best discovered parameter vectors and corresponding quality scores from GA optimization.'
                },
                {
                    id: 'json',
                    icon: '💾',
                    title: 'JSON Export',
                    description: 'Serialized experiment data containing configuration, results, and execution metrics.'
                },
                {
                    id: 'dashboard',
                    icon: '📊',
                    title: 'Analytics Dashboard',
                    description: 'Interactive visualization with multiple tabs for comprehensive result analysis and comparison.'
                },
                {
                    id: 'ga',
                    icon: '🧬',
                    title: 'GA Optimizer',
                    description: 'Population-based evolutionary search optimizing algorithm parameters across multi-dimensional space.'
                },
                {
                    id: 'fitness',
                    icon: '📈',
                    title: 'Fitness Evaluator',
                    description: 'Computes solution quality metrics by instantiating algorithms and measuring total matched weight.'
                },
                {
                    id: 'vector',
                    icon: '📋',
                    title: 'Parameter Vector',
                    description: 'Fixed-length encoding of 10 algorithm parameters enabling GA evolutionary search.'
                }
            ];

            let html = '<div class="grid-3">';
            resultItems.forEach(item => {
                html += `
                    <div class="card" onclick="openModal('${item.id}')" style="cursor: pointer">
                        <div style="font-size: 2.5rem; margin-bottom: 1rem">${item.icon}</div>
                        <h3 style="margin-bottom: 0.5rem; color: var(--primary)">${item.title}</h3>
                        <p style="line-height: 1.6; color: var(--text-secondary); font-size: 0.9rem">${item.description}</p>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('results-page').innerHTML = html;
        }

        // Navigation
        function navigateTo(pageName) {
            // Update menu active state
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // Show selected page
            const pageId = `${pageName}-page`;
            document.getElementById(pageId).classList.add('active');

            // Update header
            const pageData = pages[pageName];
            document.getElementById('page-title').textContent = pageData.title;
            document.getElementById('page-subtitle').textContent = pageData.subtitle;

            // Render page
            pageData.render();
        }

        // Modal Management
        function openModal(componentId) {
            const data = componentInfo[componentId];
            if (!data) return;

            document.getElementById('modal-title').textContent = data.title;
            let contentHTML = '';
            data.sections.forEach(section => {
                contentHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">${section.title}</div>
                        <div class="modal-section-content">`;

                if (section.bullets) {
                    contentHTML += `<ul class="modal-bullets">`;
                    section.bullets.forEach(bullet => {
                        contentHTML += `<li>${bullet}</li>`;
                    });
                    contentHTML += `</ul>`;
                } else {
                    contentHTML += section.content;
                }

                contentHTML += `</div>
                    </div>
                `;
            });

            document.getElementById('modal-content').innerHTML = contentHTML;
            document.getElementById('modal-background').classList.add('show');
            document.getElementById('modal').classList.add('show');
        }

        function openModalWithContent(title, content) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-content').innerHTML = `<div style="line-height: 1.8">${content}</div>`;
            document.getElementById('modal-background').classList.add('show');
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal-background').classList.remove('show');
            document.getElementById('modal').classList.remove('show');
        }

        // Event Listeners
        document.getElementById('modal-background').addEventListener('click', closeModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', async () => {
            await loadExperiments();
            renderArchitecturePage();
        });
    </script>
</body>
</html>
